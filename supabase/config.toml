project_id = "peekaboo-mvp"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000", "peekaboo://auth/callback"]
jwt_expiry = 3600
enable_signup = true

[storage]
enabled = true
file_size_limit = "50MiB"

[functions.whisper-stt]
verify_jwt = true

[functions.vocabulary-explanation]
verify_jwt = true

[functions.pronunciation-score]
verify_jwt = true

[functions.reading-analytics]
verify_jwt = true

[functions.secure-api]
verify_jwt = true
